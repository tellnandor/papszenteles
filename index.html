<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Meghívó</title>
  <style>
    :root {
      /* Mobil alapméretek */
      --page-w: 80vw;
      --page-h: 115vw;
      --max-w: 340px;
      --max-h: 480px;
      --dur: 1.1s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --radius: 12px;
    }

    /* PC-n (asztali nézetben) nagyobb méretek alkalmazása */
    @media (min-width: 600px) {
      :root { 
        --page-w: 500px; 
        --page-h: 720px; 
      }
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      background: #f0ece9;
      overflow: hidden;
      touch-action: none;
    }

    .viewport {
      width: var(--page-w);
      height: var(--page-h);
      perspective: 2500px;
      /* JAVÍTVA: Csökkentettük az átmenetet 0s-ra, hogy a zoom követése azonnali és rángatásmentes legyen */
      transition: transform 0s linear;
      transform-origin: center center;
    }

    .book-wrap {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease);
      transform-origin: left center;
    }

    .state-0 .book-wrap { transform: translateX(0); }
    .state-1 .book-wrap { transform: translateX(100%); }
    .state-2 .book-wrap { transform: translateX(0); }
    .state-3 .book-wrap { transform: translateX(100%); }
    .moving-to-back .book-wrap { transform: translateX(50%); }

    .leaf {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease), z-index 0.3s;
      border-radius: var(--radius);
      transform-origin: left center;
      backface-visibility: hidden;
    }

    #leaf-cover { z-index: 10; }
    #leaf-back { z-index: 5; }

    #leaf-cover.flipped { transform: rotateY(-180deg); z-index: 4; }
    #leaf-back.flipped { transform: rotateY(-180deg); z-index: 15; }

    .moving-to-back #leaf-back { z-index: 20; } 

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 25px rgba(0,0,0,0.15);
      transform: translateZ(1px);
    }

    /* Lágyabb átmenetű, több lépcsős gerinc-árnyékok */
    .face::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity var(--dur) var(--ease);
      border-radius: var(--radius);
    }

    #leaf-cover .back::after {
      background: linear-gradient(to left, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.03) 4%, rgba(0,0,0,0.01) 8%, transparent 15%);
    }

    #leaf-back .front::after {
      background: linear-gradient(to right, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.03) 4%, rgba(0,0,0,0.01) 8%, transparent 15%);
    }

    /* Árnyékok láthatósága a megfelelő oldalak nyitott állapotában */
    body.state-1 #leaf-cover .back::after,
    body.state-1 #leaf-back .front::after,
    body.state-2 #leaf-cover .back::after,
    body.state-2 #leaf-back .front::after {
      opacity: 1;
    }

    .back { transform: rotateY(180deg) translateZ(1px); }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); pointer-events: none; }

    body.state-0:not(.moving-to-back) #leaf-back, 
    body.state-3:not(.moving-to-back) #leaf-cover { visibility: hidden !important; }

    .nav-dots {
      position: fixed; bottom: 40px; display: flex; gap: 10px; left: 50%; transform: translateX(-50%);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.active { background: #2b5950; }
  </style>
</head>
<body class="state-0" onclick="handleClick(event)">

  <div class="viewport" id="zoom-viewport">
    <div class="book-wrap">
      <div class="leaf" id="leaf-back">
        <div class="face front"><img src="3.jpg"></div>
        <div class="face back"><img src="4.jpg"></div>
      </div>
      <div class="leaf" id="leaf-cover">
        <div class="face front"><img src="1.jpg"></div>
        <div class="face back"><img src="2.jpg"></div>
      </div>
    </div>
  </div>

  <div class="nav-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <script>
    let state = 0;
    const body = document.body;
    const cover = document.getElementById('leaf-cover');
    const backLeaf = document.getElementById('leaf-back');
    const dots = document.querySelectorAll('.dot');

    function move(dir) {
      if (currentScale > 1.05) return;

      const newState = state + dir;
      if (newState < 0 || newState > 3) return;

      if (state === 2 && newState === 3) {
        body.classList.add('moving-to-back');
        backLeaf.classList.add('flipped');
        setTimeout(() => {
          applyState(newState);
          setTimeout(() => body.classList.remove('moving-to-back'), 50);
        }, 800);

      } else if (state === 1 && newState === 0) {
        body.classList.add('moving-to-back');
        cover.classList.remove('flipped');
        setTimeout(() => {
          applyState(newState);
          setTimeout(() => body.classList.remove('moving-to-back'), 50);
        }, 800);
      } else {
        applyState(newState);
      }
    }

    function applyState(newState) {
      state = newState;
      body.className = 'state-' + state + (body.classList.contains('moving-to-back') ? ' moving-to-back' : '');
      cover.classList.toggle('flipped', state >= 1);
      backLeaf.classList.toggle('flipped', state >= 3);
      dots.forEach((dot, idx) => dot.classList.toggle('active', idx === state));
    }

    applyState(0);

    function handleClick(e) {
      if (currentScale > 1.05) return;
      if (e.clientX > window.innerWidth / 2) move(1);
      else move(-1);
    }

    const zoomTarget = document.getElementById('zoom-viewport');
    let currentScale = 1;
    let startScale = 1;
    let startDistance = 0;
    let touchStartX = 0;
    let touchStartY = 0;
    let panX = 0;
    let panY = 0;
    let startPanX = 0;
    let startPanY = 0;
    let isPinch = false;

    /* JAVÍTVA: Pontos ujj-koordináta alapú távolságmérés */
    function getDistance(t1, t2) {
      return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
    }

    document.addEventListener('touchstart', e => {
      if (e.touches.length === 2) {
        isPinch = true;
        /* JAVÍTVA: Az első és második ujj átadása */
        startDistance = getDistance(e.touches[0], e.touches[1]);
        startScale = currentScale;
      } else if (e.touches.length === 1) {
        isPinch = false;
        /* JAVÍTVA: e.touches helyett e.touches[0] */
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        startPanX = panX;
        startPanY = panY;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (isPinch && e.touches.length === 2) {
        /* JAVÍTVA: Az első és második ujj valós idejű követése */
        const dist = getDistance(e.touches[0], e.touches[1]);
        currentScale = Math.min(Math.max(startScale * (dist / startDistance), 1), 3);
        
        if (currentScale <= 1.02) {
          currentScale = 1;
          panX = 0;
          panY = 0;
        }
        zoomTarget.style.transform = `scale(${currentScale}) translate(${panX / currentScale}px, ${panY / currentScale}px)`;
      } else if (!isPinch && e.touches.length === 1 && currentScale > 1) {
        /* JAVÍTVA: e.touches helyett e.touches[0] használata mozgáskor */
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        panX = startPanX + dx;
        panY = startPanY + dy;
        zoomTarget.style.transform = `scale(${currentScale}) translate(${panX / currentScale}px, ${panY / currentScale}px)`;
      }
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (currentScale <= 1.05 && e.touches.length === 0 && !isPinch) {
        const touchEndX = e.changedTouches[0].clientX;
        if (touchStartX - touchEndX > 50) move(1);
        if (touchStartX - touchEndX < -50) move(-1);
      }
      
      if (e.touches.length < 2) {
        isPinch = false;
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') move(1);
      if (e.key === 'ArrowLeft') move(-1);
    });
  </script>
</body>
</html>
