<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Meghívó</title>
  <style>
    :root {
      /* Fix méretek, amelyek nem függnek a böngészősávok mozgásától */
      --page-w: 320px;
      --page-h: 460px;
      --dur: 1.1s;
      --ease: cubic-bezier(.645, .045, .355, 1);
      --radius: 12px;
    }

    /* Kisebb kijelzőjű telefonok támogatása */
    @media (max-width: 330px) {
      :root {
        --page-w: 280px;
        --page-h: 400px;
      }
    }

    /* PC-n (asztali nézetben) nagyobb méretek alkalmazása */
    @media (min-width: 600px) {
      :root { 
        --page-w: 500px; 
        --page-h: 720px; 
      }
    }

    /* Fixált magasság és pozíció, ami teljesen immúnis a dinamikus címsorokra */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      overflow: hidden;
      background: #f0ece9;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 40px;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
    }

    .viewport {
      width: var(--page-w);
      height: var(--page-h);
      perspective: 2500px;
    }

    .book-wrap {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease);
      transform-origin: left center;
    }

    .state-0 .book-wrap { transform: translateX(0); }
    .state-1 .book-wrap { transform: translateX(100%); }
    .state-2 .book-wrap { transform: translateX(0); }
    .state-3 .book-wrap { transform: translateX(100%); }
    .moving-to-back .book-wrap { transform: translateX(50%); }

    .leaf {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform var(--dur) var(--ease), z-index 0.3s;
      border-radius: var(--radius);
      transform-origin: left center;
      backface-visibility: hidden;
    }

    #leaf-cover { z-index: 10; }
    #leaf-back { z-index: 5; }

    #leaf-cover.flipped { transform: rotateY(-180deg); z-index: 4; }
    #leaf-back.flipped { transform: rotateY(-180deg); z-index: 15; }

    .moving-to-back #leaf-back { z-index: 20; } 
    
    /* Megakadályozza, hogy az 1. oldalra való visszalapozás közben a belső lapok előreugorjanak a z-index miatt */
    body.state-1.moving-to-back #leaf-cover { z-index: 25; }

    .face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      background: white;
      box-shadow: 0 5px 25px rgba(0,0,0,0.15);
      transform: translateZ(1px);
    }

    /* Kisebb és mindkét oldalon teljesen szimmetrikus belső árnyék */
    .face::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius);
      background: linear-gradient(to right, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(0,0,0,0) 100%);
      pointer-events: none;
      transition: opacity var(--dur) var(--ease);
      opacity: 1;
    }

    .back::after {
      background: linear-gradient(to left, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0) 4%, rgba(0,0,0,0) 100%);
    }

    /* A lapozás közbeni lágyulás mértéke is teljesen azonossá és szimmetrikussá vált */
    .flipped .front::after,
    :not(.flipped) .back::after {
      opacity: 0.3;
    }

    .back { transform: rotateY(180deg) translateZ(1px); }
    img { width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius); pointer-events: none; }

    body.state-0:not(.moving-to-back) #leaf-back, 
    body.state-3:not(.moving-to-back) #leaf-cover { visibility: hidden !important; }

    .nav-dots {
      position: fixed; bottom: 40px; display: flex; gap: 10px; left: 50%; transform: translateX(-50%);
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.5); }
    .dot.active { background: #2b5950; }
  </style>
</head>
<body class="state-0" onclick="handleClick(event)">

  <div class="viewport">
    <div class="book-wrap">
      <div class="leaf" id="leaf-back">
        <div class="face front"><img src="3.jpg"></div>
        <div class="face back"><img src="4.jpg"></div>
      </div>
      <div class="leaf" id="leaf-cover">
        <div class="face front"><img src="1.jpg"></div>
        <div class="face back"><img src="2.jpg"></div>
      </div>
    </div>
  </div>

  <div class="nav-dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>

  <script>
    let state = 0;
    const body = document.body;
    const cover = document.getElementById('leaf-cover');
    const backLeaf = document.getElementById('leaf-back');
    const dots = document.querySelectorAll('.dot');

    function move(dir) {
      const newState = state + dir;
      if (newState < 0 || newState > 3) return;

      if (state === 2 && newState === 3) {
        body.classList.add('moving-to-back');
        backLeaf.classList.add('flipped');
        setTimeout(() => {
          applyState(newState);
          setTimeout(() => body.classList.remove('moving-to-back'), 50);
        }, 1100);

      } else if (state === 1 && newState === 0) {
        body.classList.add('moving-to-back');
        cover.classList.remove('flipped');
        setTimeout(() => {
          applyState(newState);
          setTimeout(() => body.classList.remove('moving-to-back'), 50);
        }, 1100);
      } else {
        applyState(newState);
      }
    }

    function applyState(newState) {
      state = newState;
      body.className = 'state-' + state + (body.classList.contains('moving-to-back') ? ' moving-to-back' : '');
      cover.classList.toggle('flipped', state >= 1);
      backLeaf.classList.toggle('flipped', state >= 3);
      dots.forEach((dot, idx) => dot.classList.toggle('active', idx === state));
    }

    applyState(0);

    function handleClick(e) {
      if (e.clientX > window.innerWidth / 2) move(1);
      else move(-1);
    }

    /* Kifogástalan, fixált Swipe (elhúzás) kezelés */
    let touchStartX = 0;
    document.addEventListener('touchstart', e => { 
      touchStartX = e.changedTouches[0].clientX; 
    }, { passive: true });

    document.addEventListener('touchend', e => {
      const touchEndX = e.changedTouches[0].clientX;
      const diffX = touchStartX - touchEndX;

      // Csak akkor lapoz, ha a húzás hossza nagyobb, mint 50 pixel
      if (diffX > 50) {
        move(1); // Balra húzás -> Következő oldal
      } else if (diffX < -50) {
        move(-1); // Jobbra húzás -> Előző oldal
      }
    }, { passive: true });

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') move(1);
      if (e.key === 'ArrowLeft') move(-1);
    });
  </script>
</body>
</html>
